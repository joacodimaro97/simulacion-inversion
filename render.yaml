# Configuración para desplegar el frontend como Static Site en Render.
# Si ya tenés el servicio creado en el dashboard, podés copiar la regla de rewrite allí:
# Settings → Redirects/Rewrites → /* → /index.html (Rewrite)

services:
  - type: web
    name: fci-tracker-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
